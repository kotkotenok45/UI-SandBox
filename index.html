<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UI Mobile Sandbox</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22UI%20Art%20Sandbox%22,%22short_name%22:%22UISandbox%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#090d16%22,%22theme_color%22:%22#38bdf8%22}">
    
    <style>
        /* Сетка холста */
        .canvas-grid {
            background-size: 20px 20px;
            background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
        }
        /* Скрытие скроллбаров */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Плавное появление шторки */
        .bottom-sheet {
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .sheet-hidden { transform: translateY(100%); }
    </style>
</head>
<body class="bg-[#090d16] text-slate-100 h-screen w-screen overflow-hidden flex flex-col font-sans select-none">

    <header class="h-14 border-b border-slate-800 flex items-center justify-between px-4 bg-[#0d1527]/80 backdrop-blur-md shrink-0 z-10">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-sky-400">palette</span>
            <span class="font-bold text-sm tracking-wide bg-gradient-to-r from-sky-400 to-purple-400 bg-clip-text text-transparent">UI Lab Mobile</span>
        </div>
        <div class="flex items-center gap-1.5">
            <button onclick="openSheet('templatesSheet')" class="p-2 hover:bg-slate-800 rounded-lg text-slate-400 flex items-center"><span class="material-symbols-outlined text-xl">folder_open</span></button>
            <button onclick="clearCanvas()" class="p-2 hover:bg-rose-950/40 rounded-lg text-rose-400 flex items-center"><span class="material-symbols-outlined text-xl">delete_sweep</span></button>
            <button onclick="openSheet('creatorSheet')" class="py-1.5 px-3 bg-sky-500 hover:bg-sky-400 text-slate-950 rounded-lg text-xs font-bold flex items-center gap-1 shadow-lg shadow-sky-500/20">
                <span class="material-symbols-outlined text-sm font-bold">add</span> Создать
            </button>
        </div>
    </header>

    <main id="canvas" class="flex-1 relative overflow-hidden canvas-grid p-4 active:cursor-grabbing">
        <div id="canvasContent" class="w-full h-full relative">
            <div id="placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-center p-6 text-slate-500 pointer-events-none">
                <span class="material-symbols-outlined text-4xl mb-2 text-slate-600 animate-pulse">touch_app</span>
                <p class="text-sm font-medium">Холст пуст</p>
                <p class="text-xs max-w-xs mt-1">Нажмите «Создать» чтобы добавить UI. Тапайте по элементам для изменения градиентов, эффектов и текста.</p>
            </div>
        </div>
    </main>

    <div id="creatorSheet" class="bottom-sheet sheet-hidden fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-[#0d1527] border-t border-slate-800 rounded-t-2xl shadow-2xl z-30 p-4 pb-6">
        <div class="w-12 h-1 bg-slate-700 rounded-full mx-auto mb-4" onclick="closeAllSheets()"></div>
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-sm font-bold uppercase tracking-wider text-slate-400">Добавить базовый слой</h3>
            <button onclick="closeAllSheets()" class="text-slate-400 text-xl">&times;</button>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="spawnElement('card')" class="flex flex-col items-center gap-2 p-4 bg-slate-800/50 border border-slate-700/50 rounded-xl hover:bg-slate-800"><span class="material-symbols-outlined text-2xl text-purple-400">layers</span><span class="text-xs">Контейнер / Карта</span></button>
            <button onclick="spawnElement('button')" class="flex flex-col items-center gap-2 p-4 bg-slate-800/50 border border-slate-700/50 rounded-xl hover:bg-slate-800"><span class="material-symbols-outlined text-2xl text-blue-400">smart_button</span><span class="text-xs">Интерактивная кнопка</span></button>
            <button onclick="spawnElement('input')" class="flex flex-col items-center gap-2 p-4 bg-slate-800/50 border border-slate-700/50 rounded-xl hover:bg-slate-800"><span class="material-symbols-outlined text-2xl text-emerald-400">edit_square</span><span class="text-xs">Поле ввода</span></button>
            <button onclick="spawnElement('text')" class="flex flex-col items-center gap-2 p-4 bg-slate-800/50 border border-slate-700/50 rounded-xl hover:bg-slate-800"><span class="material-symbols-outlined text-2xl text-amber-400">text_fields</span><span class="text-xs">Кастомный текст</span></button>
        </div>
    </div>

    <div id="templatesSheet" class="bottom-sheet sheet-hidden fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-[#0d1527] border-t border-slate-800 rounded-t-2xl shadow-2xl z-30 p-4 pb-6">
        <div class="w-12 h-1 bg-slate-700 rounded-full mx-auto mb-4" onclick="closeAllSheets()"></div>
        <div class="mb-4">
            <h3 class="text-sm font-bold uppercase tracking-wider text-slate-400 mb-2">Готовые пресеты и темплейты</h3>
            <select id="templateSelect" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-sm focus:outline-none focus:border-sky-500 mb-3 text-slate-200">
                <option value="neon_card">Градиентная Неон-Карта</option>
                <option value="glass_login">Стеклянный стек (Glassmorphism)</option>
                <option value="cyber_hud">Киберпанк Виджет</option>
            </select>
            <div class="flex gap-2">
                <button onclick="loadTemplate()" class="flex-1 py-2.5 bg-slate-800 border border-slate-700 rounded-xl text-xs font-bold">Выгрузить</button>
                <button onclick="saveCurrentAsTemplate()" class="flex-1 py-2.5 bg-sky-600 text-slate-950 rounded-xl text-xs font-bold">Сохранить текущий</button>
            </div>
        </div>
    </div>

    <div id="inspectorSheet" class="bottom-sheet sheet-hidden fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-[#0d1424] border-t border-sky-900/50 rounded-t-2xl shadow-2xl z-40 p-4 max-h-[85vh] overflow-y-auto no-scrollbar pb-8">
        <div class="w-12 h-1 bg-slate-700 rounded-full mx-auto mb-3" onclick="closeAllSheets()"></div>
        
        <div class="flex justify-between items-center border-b border-slate-800 pb-3 mb-4">
            <span class="text-xs font-bold text-sky-400 uppercase tracking-wider flex items-center gap-1"><span class="material-symbols-outlined text-sm">tune</span> Стили Слой-Арта</span>
            <button onclick="closeAllSheets()" class="text-slate-400 text-xl">&times;</button>
        </div>

        <div class="space-y-4 text-xs">
            <div>
                <label class="block text-slate-400 mb-1">Контент / Текст внутри:</label>
                <input type="text" id="styleText" oninput="applyStyle('text', this.value)" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-slate-200 focus:outline-none focus:border-sky-500">
            </div>

            <div>
                <label class="block text-slate-400 mb-1.5">Тип заливки / Фон:</label>
                <div class="grid grid-cols-3 gap-1.5 mb-2">
                    <button onclick="applyStyle('bgType', 'solid')" class="py-2 bg-slate-800 rounded-md font-medium border border-transparent active:border-sky-500">Сплошной</button>
                    <button onclick="applyStyle('bgType', 'grad1')" class="py-2 bg-gradient-to-r from-purple-600 to-pink-500 rounded-md font-medium">Градиент 1</button>
                    <button onclick="applyStyle('bgType', 'grad2')" class="py-2 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-md font-medium">Градиент 2</button>
                    <button onclick="applyStyle('bgType', 'grad3')" class="py-2 bg-gradient-to-tr from-yellow-500 to-rose-500 rounded-md font-medium">Градиент 3</button>
                    <button onclick="applyStyle('bgType', 'glass')" class="py-2 bg-white/10 backdrop-blur-md rounded-md border border-white/10 font-medium">Стекло</button>
                    <button onclick="applyStyle('bgType', 'cyber')" class="py-2 bg-black border-2 border-yellow-400 rounded-md font-medium text-yellow-400">Cyber</button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-slate-400 mb-1">Скругление углов:</label>
                    <select id="styleRadius" onchange="applyStyle('radius', this.value)" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 focus:outline-none">
                        <option value="rounded-none">Острые</option>
                        <option value="rounded-md">Небольшое (6px)</option>
                        <option value="rounded-xl" selected>Стильное (12px)</option>
                        <option value="rounded-3xl">Экстремальное (24px)</option>
                        <option value="rounded-full">Овал / Круг</option>
                    </select>
                </div>
                <div>
                    <label class="block text-slate-400 mb-1">Свечение / Тень:</label>
                    <select id="styleShadow" onchange="applyStyle('shadow', this.value)" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 focus:outline-none">
                        <option value="shadow-none">Без тени</option>
                        <option value="shadow-md">Обычная</option>
                        <option value="shadow-xl">Глубокая</option>
                        <option value="shadow-[0_0_20px_rgba(139,92,246,0.5)]">Фиолетовый неон</option>
                        <option value="shadow-[0_0_20px_rgba(6,182,212,0.5)]">Циановое пламя</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-slate-400 mb-1">Экспериментальные деформации:</label>
                <div class="grid grid-cols-3 gap-1.5">
                    <button onclick="applyStyle('transform', 'rotate-3')" class="p-2 bg-slate-800 rounded-md">Поворот R</button>
                    <button onclick="applyStyle('transform', '-rotate-3')" class="p-2 bg-slate-800 rounded-md">Поворот L</button>
                    <button onclick="applyStyle('transform', 'skew-x-6')" class="p-2 bg-slate-800 rounded-md">Скос X</button>
                    <button onclick="applyStyle('transform', 'scale-90')" class="p-2 bg-slate-800 rounded-md">Сжать</button>
                    <button onclick="applyStyle('transform', 'blur-[2px]')" class="p-2 bg-slate-800 rounded-md">Размыть</button>
                    <button onclick="applyStyle('transform', 'clear')" class="p-2 bg-rose-950/40 text-rose-400 border border-rose-900/30 rounded-md">Сбросить геометрию</button>
                </div>
            </div>

            <div class="pt-2 flex gap-2">
                <button onclick="duplicateElement()" class="flex-1 py-3 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-200 rounded-xl font-bold transition">Дублировать</button>
                <button onclick="deleteElement()" class="flex-1 py-3 bg-rose-600 hover:bg-rose-500 text-white rounded-xl font-bold transition">Уничтожить слой</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvasContent');
        const placeholder = document.getElementById('placeholder');
        let activeElement = null;

        // Встроенные креативные шаблоны с градиентами и эффектами
        const builtInTemplates = {
            neon_card: `<div class="sandbox-item absolute p-6 bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-900 rounded-2xl shadow-[0_0_30px_rgba(236,72,153,0.3)] border border-pink-500/30" style="top:20%; left:10%; width:280px;">
                <div class="text-xs uppercase tracking-widest text-pink-400 font-bold mb-1">Cyber Art</div>
                <h3 class="text-lg font-black text-white leading-tight mb-2">Градиентный Слой</h3>
                <p class="text-xs text-purple-200/80">Этот контейнер использует сложную схему затекания цветов via-to. Двигай меня пальцем!</p>
            </div>`,
            glass_login: `<div class="sandbox-item absolute p-6 bg-white/5 backdrop-blur-xl rounded-3xl border border-white/10 shadow-2xl" style="top:15%; left:15%; width:290px;">
                <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-cyan-400 to-blue-500 mx-auto mb-4 shadow-[0_0_20px_rgba(34,211,238,0.4)]"></div>
                <input type="text" placeholder="ID Кошелька" class="w-full bg-black/20 border border-white/5 rounded-xl p-2.5 text-xs text-white mb-2 text-center focus:outline-none">
                <button class="w-full py-2.5 bg-gradient-to-r from-cyan-400 to-blue-500 text-slate-950 font-black text-xs rounded-xl shadow-lg">АВТОРИЗАЦИЯ</button>
            </div>`,
            cyber_hud: `<div class="sandbox-item absolute p-3 bg-black border-2 border-yellow-400 rounded-none shadow-[4px_4px_0px_#eab308]" style="top:30%; left:20%; width:240px;">
                <div class="bg-yellow-400 text-black text-[10px] font-black px-1.5 py-0.5 inline-block mb-2">SYSTEM ERROR</div>
                <div class="text-yellow-400 font-mono text-xs">CRITICAL OVERLOAD: 99%</div>
                <div class="w-full bg-slate-900 h-1 mt-2 relative"><div class="bg-yellow-400 h-full w-4/5"></div></div>
            </div>`
        };

        // Открытие / закрытие UI шторок (идеально для смартфонов)
        function openSheet(id) {
            closeAllSheets();
            document.getElementById(id).classList.remove('sheet-hidden');
        }

        function closeAllSheets() {
            document.querySelectorAll('.bottom-sheet').forEach(sheet => sheet.classList.add('sheet-hidden'));
        }

        // Спавн элементов на холсте
        function spawnElement(type) {
            placeholder.style.display = 'none';
            const el = document.createElement('div');
            
            // Настройки адаптивного размера по умолчанию
            const randomTop = Math.floor(Math.random() * 30) + 15;
            const randomLeft = Math.floor(Math.random() * 15) + 10;
            
            el.className = 'sandbox-item absolute p-4 bg-slate-800 rounded-xl border border-slate-700/60 shadow-lg touch-none transition-transform duration-75';
            el.style.top = `${randomTop}%`;
            el.style.left = `${randomLeft}%`;
            el.style.width = '240px';

            if (type === 'card') {
                el.className += ' bg-gradient-to-r from-purple-600 to-indigo-600';
                el.innerHTML = `<h4 class="font-bold text-white text-sm">Градиентный арт-контейнер</h4><p class="text-[11px] text-purple-100/70 mt-1">Кликни, чтобы изменить эффекты.</p>`;
            } else if (type === 'button') {
                el.style.width = '180px';
                el.innerHTML = `<button class="w-full py-2.5 bg-gradient-to-r from-emerald-400 to-teal-500 text-slate-950 font-extrabold text-xs rounded-lg tracking-wide uppercase shadow-md pointer-events-none">Жми экран</button>`;
            } else if (type === 'input') {
                el.innerHTML = `<input type="text" placeholder="Пиши что угодно..." class="w-full bg-slate-950/50 border border-slate-600 rounded-lg p-2 text-xs text-white placeholder-slate-500 focus:outline-none pointer-events-none">`;
            } else if (type === 'text') {
                el.style.width = '200px';
                el.className = 'sandbox-item absolute p-2 border border-transparent touch-none';
                el.innerHTML = `<p class="text-base font-black bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent">Яркий текст без границ</p>`;
            }

            canvas.appendChild(el);
            bindTouchEvents(el);
            closeAllSheets();
            triggerSelect(el);
        }

        // Управление выбором элемента
        function triggerSelect(el) {
            activeElement = el;
            // Убираем старые рамки выделения
            document.querySelectorAll('.sandbox-item').forEach(i => i.style.outline = 'none');
            // Подсвечиваем выбранный слой неоновым контуром
            el.style.outline = '2px solid #38bdf8';
            
            // Загружаем текущие параметры в шторку-инспектор
            document.getElementById('styleText').value = el.innerText || '';
            openSheet('inspectorSheet');
        }

        // Комплексный Манипулятор Дизайна (Градиенты, размытия, скругления)
        function applyStyle(action, value) {
            if (!activeElement) return;

            if (action === 'text') {
                const target = activeElement.querySelector('h4, p, button, input') || activeElement;
                if(target.tagName === 'INPUT') target.placeholder = value;
                else target.innerText = value;
            } 
            else if (action === 'bgType') {
                // Очищаем старые классы фонов Tailwind
                activeElement.className = activeElement.className.replace(/bg-[\w-\/[\]]+|from-[\w-]+|to-[\w-]+|via-[\w-]+|backdrop-blur-[\w-]+/g, '').trim();
                
                if (value === 'solid') activeElement.classList.add('bg-slate-800');
                if (value === 'grad1') activeElement.classList.add('bg-gradient-to-r', 'from-purple-600', 'to-pink-500');
                if (value === 'grad2') activeElement.classList.add('bg-gradient-to-br', 'from-cyan-500', 'to-blue-600');
                if (value === 'grad3') activeElement.classList.add('bg-gradient-to-tr', 'from-yellow-500', 'to-rose-500');
                if (value === 'glass') activeElement.classList.add('bg-white/10', 'backdrop-blur-md', 'border-white/20');
                if (value === 'cyber') activeElement.classList.add('bg-black', 'border-2', 'border-yellow-400');
            } 
            else if (action === 'radius') {
                activeElement.className = activeElement.className.replace(/rounded-[\w-]+/g, '').trim();
                activeElement.classList.add(value);
            } 
            else if (action === 'shadow') {
                activeElement.className = activeElement.className.replace(/shadow-[\w-]+|shadow-\[.+\]/g, '').trim();
                activeElement.classList.add(value);
            }
            else if (action === 'transform') {
                if (value === 'clear') {
                    activeElement.className = activeElement.className.replace(/rotate-[\w-]+|-rotate-[\w-]+|skew-x-[\w-]+|scale-[\w-]+|blur-[\w-\/[\]]+/g, '').trim();
                } else {
                    activeElement.classList.add(value);
                }
            }
        }

        // Мобильный Drag & Drop (Touch + Mouse) через матрицы трансформаций
        function bindTouchEvents(el) {
            let currentX, currentY, initialX, initialY;
            let xOffset = 0, yOffset = 0;
            let isDragging = false;

            // Считываем стартовые координаты, если элемент уже перемещался
            if (el.dataset.x) xOffset = parseFloat(el.dataset.x);
            if (el.dataset.y) yOffset = parseFloat(el.dataset.y);
            el.style.transform = `translate3d(${xOffset}px, ${yOffset}px, 0)`;

            el.addEventListener('touchstart', dragStart, {passive:
