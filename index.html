<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UI Vector Sandbox</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="manifest" href="manifest.json">
    
    <style>
        .canvas-grid {
            background-size: 25px 25px;
            background-image: linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .bottom-sheet {
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sheet-hidden { transform: translateY(100%); }
        
        /* Стилизация SVG линий */
        .neon-glow-line {
            transition: stroke-width 0.1s, filter 0.2s;
        }
        .line-selected {
            stroke-dasharray: 4;
            animation: dash 1s linear infinite;
        }
        @keyframes dash { to { stroke-dashoffset: -20; } }
    </style>
</head>
<body class="bg-[#060913] text-slate-100 h-screen w-screen overflow-hidden flex flex-col font-sans select-none">

    <header class="h-14 border-b border-slate-800 flex items-center justify-between px-4 bg-[#0a101f]/90 backdrop-blur-md shrink-0 z-10">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-sky-400">gesture</span>
            <span class="font-bold text-sm tracking-wide bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent">Vector UI Lab</span>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="openSheet('templatesSheet')" class="p-2 hover:bg-slate-800 rounded-xl text-slate-400 flex items-center"><span class="material-symbols-outlined text-xl">folder</span></button>
            <button onclick="clearCanvas()" class="p-2 hover:bg-rose-950/40 rounded-xl text-rose-400 flex items-center"><span class="material-symbols-outlined text-xl">delete</span></button>
            <button onclick="openSheet('creatorSheet')" class="py-2 px-4 bg-sky-500 hover:bg-sky-400 text-slate-950 rounded-xl text-xs font-black flex items-center gap-1 shadow-lg shadow-sky-500/20">
                <span class="material-symbols-outlined text-sm font-bold">add</span> Создать
            </button>
        </div>
    </header>

    <main id="canvas" class="flex-1 relative overflow-hidden canvas-grid p-4">
        <svg id="svgLayer" class="absolute inset-0 w-full h-full pointer-events-auto z-0">
            </svg>

        <div id="canvasContent" class="w-full h-full absolute inset-0 z-50 pointer-events-none">
            <div id="placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-center p-6 text-slate-600 pointer-events-none">
                <span class="material-symbols-outlined text-5xl mb-2 text-slate-700">insights</span>
                <p class="text-sm font-medium">Интерфейс чист</p>
                <p class="text-xs max-w-xs mt-1">Создавайте блоки или светящиеся неоновые кривые линии. Тапните по ним для полной кастомизации.</p>
            </div>
        </div>
    </main>

    <div id="creatorSheet" class="bottom-sheet sheet-hidden fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-[#0a101f] border-t border-slate-800 rounded-t-2xl shadow-2xl z-[100] p-4 pb-6">
        <div class="w-12 h-1 bg-slate-700 rounded-full mx-auto mb-4" onclick="closeAllSheets()"></div>
        <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-3">Добавить на холст</h3>
        <div class="grid grid-cols-2 gap-3 text-xs font-medium">
            <button onclick="spawnElement('card')" class="flex items-center gap-3 p-3.5 bg-slate-800 rounded-xl"><span class="material-symbols-outlined text-purple-400">layers</span>Контейнер-Карта</button>
            <button onclick="spawnElement('button')" class="flex items-center gap-3 p-3.5 bg-slate-800 rounded-xl"><span class="material-symbols-outlined text-blue-400">smart_button</span>Кнопка действия</button>
            <button onclick="spawnCurve()" class="flex items-center gap-3 p-3.5 bg-indigo-950 border border-indigo-500/30 rounded-xl"><span class="material-symbols-outlined text-indigo-400">timeline</span>Светящаяся линия</button>
            <button onclick="spawnElement('text')" class="flex items-center gap-3 p-3.5 bg-slate-800 rounded-xl"><span class="material-symbols-outlined text-amber-400">text_fields</span>Текст / Заголовок</button>
        </div>
    </div>

    <div id="lineInspectorSheet" class="bottom-sheet sheet-hidden fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-[#0a101f] border-t border-indigo-900/50 rounded-t-2xl shadow-2xl z-[100] p-4 max-h-[80vh] overflow-y-auto no-scrollbar pb-6">
        <div class="w-12 h-1 bg-slate-700 rounded-full mx-auto mb-3" onclick="closeAllSheets()"></div>
        <div class="flex justify-between items-center border-b border-slate-800 pb-2 mb-4">
            <span class="text-xs font-bold text-indigo-400 uppercase tracking-wider flex items-center gap-1"><span class="material-symbols-outlined text-sm">polyline</span>Параметры Неоновой Линии</span>
            <button onclick="closeAllSheets()" class="text-slate-400 text-lg">&times;</button>
        </div>
        <div class="space-y-4 text-xs">
            <div>
                <div class="flex justify-between text-slate-400 mb-1"><span>Форма линии (Изгиб):</span><span id="curveVal">0</span></div>
                <input type="range" id="inputCurvature" min="-200" max="200" value="50" oninput="updateLineStyle('curvature', this.value)" class="w-full h-1.5 bg-slate-800 rounded-lg appearance-none accent-indigo-500">
            </div>
            <div>
                <div class="flex justify-between text-slate-400 mb-1"><span>Толщина (Width):</span><span id="widthVal">3px</span></div>
                <input type="range" id="inputWidth" min="1" max="12" value="3" oninput="updateLineStyle('width', this.value)" class="w-full h-1.5 bg-slate-800 rounded-lg appearance-none accent-indigo-500">
            </div>
            <div>
                <label class="block text-slate-400 mb-1.5">Неоновый спектр подсветки:</label>
                <div class="grid grid-cols-4 gap-2">
                    <button onclick="updateLineStyle('color', '#38bdf8')" class="p-2 bg-sky-500 rounded-lg text-slate-950 font-bold">Циан</button>
                    <button onclick="updateLineStyle('color', '#a855f7')" class="p-2 bg-purple-500 rounded-lg text-white font-bold">Пурпур</button>
                    <button onclick="updateLineStyle('color', '#f43f5e')" class="p-2 bg-rose-500 rounded-lg text-white font-bold">Розовый</button>
                    <button onclick="updateLineStyle('color', '#eab308')" class="p-2 bg-yellow-500 rounded-lg text-slate-950 font-bold">Лайм</button>
                </div>
            </div>
            <div class="pt-2">
                <button onclick="deleteLine()" class="w-full py-3 bg-rose-600 hover:bg-rose-500 text-white font-bold rounded-xl transition">Удалить векторную линию</button>
            </div>
        </div>
    </div>

    <div id="inspectorSheet" class="bottom-sheet sheet-hidden fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-[#0a101f] border-t border-sky-900/40 rounded-t-2xl shadow-2xl z-[100] p-4 max-h-[80vh] overflow-y-auto no-scrollbar pb-6">
        <div class="w-12 h-1 bg-slate-700 rounded-full mx-auto mb-3" onclick="closeAllSheets()"></div>
        <div class="flex justify-between items-center border-b border-slate-800 pb-2 mb-4">
            <span class="text-xs font-bold text-sky-400 uppercase tracking-wider flex items-center gap-1"><span class="material-symbols-outlined text-sm">tune</span> Стили Элемента</span>
            <button onclick="closeAllSheets()" class="text-slate-400 text-lg">&times;</button>
        </div>
        <div class="space-y-4 text-xs">
            <div>
                <label class="block text-slate-400 mb-1">Текст контента:</label>
                <input type="text" id="styleText" oninput="applyStyle('text', this.value)" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-slate-200 focus:outline-none">
            </div>
            <div>
                <label class="block text-slate-400 mb-1.5">Фон и Градиенты:</label>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="applyStyle('bgType', 'solid')" class="p-2 bg-slate-800 rounded-lg">Сплошной</button>
                    <button onclick="applyStyle('bgType', 'grad1')" class="p-2 bg-gradient-to-r from-purple-600 to-pink-500 rounded-lg text-[10px]">Пурпур-Град</button>
                    <button onclick="applyStyle('bgType', 'grad2')" class="p-2 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-lg text-[10px]">Океан-Град</button>
                    <button onclick="applyStyle('bgType', 'glass')" class="p-2 bg-white/10 border border-white/10 rounded-lg">Стекло</button>
                    <button onclick="applyStyle('bgType', 'cyber')" class="p-2 bg-black border border-yellow-400 rounded-lg text-yellow-400">Cyber</button>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-slate-400 mb-1">Скругление углов:</label>
                    <select id="styleRadius" onchange="applyStyle('radius', this.value)" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-2.5 focus:outline-none">
                        <option value="rounded-none">Острые</option>
                        <option value="rounded-xl" selected>Обычное</option>
                        <option value="rounded-3xl">Круглое</option>
                    </select>
                </div>
                <div>
                    <label class="block text-slate-400 mb-1">Свечение / Тень:</label>
                    <select id="styleShadow" onchange="applyStyle('shadow', this.value)" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-2.5 focus:outline-none">
                        <option value="shadow-none">Без тени</option>
                        <option value="shadow-[0_0_20px_rgba(139,92,246,0.4)]">Фиолетовый неон</option>
                        <option value="shadow-[0_0_20px_rgba(6,182,212,0.4)]">Циан неон</option>
                    </select>
                </div>
            </div>
            <div class="pt-2 flex gap-2">
                <button onclick="duplicateElement()" class="flex-1 py-3 bg-slate-800 text-slate-200 rounded-xl font-bold">Дублировать</button>
                <button onclick="deleteElement()" class="flex-1 py-3 bg-rose-600 text-white rounded-xl font-bold">Удалить</button>
            </div>
        </div>
    </div>

    <div id="templatesSheet" class="bottom-sheet sheet-hidden fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-[#0a101f] border-t border-slate-800 rounded-t-2xl shadow-2xl z-[100] p-4 pb-6">
        <div class="w-12 h-1 bg-slate-700 rounded-full mx-auto mb-4" onclick="closeAllSheets()"></div>
        <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Хранилище шаблонов</h3>
        <select id="templateSelect" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-xs mb-3 focus:outline-none"></select>
        <div class="flex gap-2">
            <button onclick="loadTemplate()" class="flex-1 py-3 bg-slate-800 rounded-xl text-xs font-bold">Загрузить</button>
            <button onclick="saveCurrentAsTemplate()" class="flex-1 py-3 bg-sky-600 text-slate-950 rounded-xl text-xs font-bold">Сохранить</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const canvasContent = document.getElementById('canvasContent');
        const svgLayer = document.getElementById('svgLayer');
        const placeholder = document.getElementById('placeholder');
        
        let activeElement = null;
        let activeLine = null;

        // Фикс кликов: Проверка смещения для отделения тапа от перетаскивания
        const CLICK_THRESHOLD = 6; 

        function openSheet(id) {
            closeAllSheets();
            document.getElementById(id).classList.remove('sheet-hidden');
        }

        function closeAllSheets() {
            document.querySelectorAll('.bottom-sheet').forEach(sheet => sheet.classList.add('sheet-hidden'));
        }

        // Создание HTML блоков
        function spawnElement(type) {
            placeholder.style.display = 'none';
            const el = document.createElement('div');
            el.className = 'sandbox-item absolute p-4 bg-slate-800 rounded-xl border border-slate-700/60 shadow-lg touch-none pointer-events-auto select-none';
            
            const top = Math.floor(Math.random() * 30) + 20;
            const left = Math.floor(Math.random() * 20) + 15;
            el.style.top = `${top}%`;
            el.style.left = `${left}%`;
            el.style.width = '220px';

            if (type === 'card') {
                el.className += ' bg-gradient-to-r from-purple-600 to-indigo-600';
                el.innerHTML = `<h4 class="font-bold text-white text-xs">Смарт-контейнер</h4><p class="text-[10px] text-purple-100/70 mt-0.5">Перетаскивай пальцем.</p>`;
            } else if (type === 'button') {
                el.style.width = '160px';
                el.innerHTML = `<button class="w-full py-2 bg-sky-500 text-slate-950 font-black text-[10px] rounded-lg uppercase tracking-wider">Кнопка</button>`;
            } else if (type === 'text') {
                el.style.width = '180px';
                el.className = 'sandbox-item absolute p-1 border border-transparent touch-none pointer-events-auto';
                el.innerHTML = `<p class="text-sm font-black bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent">Кастомный Текст</p>`;
            }

            canvasContent.appendChild(el);
            bindTouchDrag(el, true);
            closeAllSheets();
            selectElement(el);
        }

        // Создание векторных кривых с подсветкой (SVG)
        function spawnCurve() {
            placeholder.style.display = 'none';
            
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            
            // Задаем базовые точки кривой Безье по центру
            const w = svgLayer.clientWidth || window.innerWidth;
            const h = svgLayer.clientHeight || window.innerHeight;
            
            path.dataset.x1 = w * 0.2; path.dataset.y1 = h * 0.4;
            path.dataset.x2 = w * 0.8; path.dataset.y2 = h * 0.4;
            path.dataset.curvature = "60"; // Прогиб кривой
            
            path.setAttribute("fill", "none");
            path.setAttribute("stroke", "#38bdf8");
            path.setAttribute("stroke-width", "4");
            path.setAttribute("filter", "drop-shadow(0px 0px 8px #38bdf8)");
            path.setAttribute("class", "neon-glow-line cursor-pointer");
            
            svgLayer.appendChild(path);
            renderPath(path);
            bindLineTouch(path);
            closeAllSheets();
            selectLine(path);
        }

        function renderPath(path) {
            const x1 = parseFloat(path.dataset.x1); const y1 = parseFloat(path.dataset.y1);
            const x2 = parseFloat(path.dataset.x2); const y2 = parseFloat(path.dataset.y2);
            const curv = parseFloat(path.dataset.curvature);
            
            // Вычисляем центральную точку изгиба кривой
            const midX = (x1 + x2) / 2;
            const midY = ((y1 + y2) / 2) + curv;
            
            // Рисуем квадратичную кривую Безье Q
            path.setAttribute("d", `M ${x1} ${y1} Q ${midX} ${midY} ${x2} ${y2}`);
        }

        // Выбор и активация сущностей
        function selectElement(el) {
            unselectAll();
            activeElement = el;
            el.style.outline = '2px solid #38bdf8';
            document.getElementById('styleText').value = el.innerText || '';
            openSheet('inspectorSheet');
        }

        function selectLine(path) {
            unselectAll();
            activeLine = path;
            path.classList.add('line-selected');
            
            // Переносим параметры в ползунки инспектора кривых
            document.getElementById('inputCurvature').value = path.dataset.curvature;
            document.getElementById('curveVal').textContent = path.dataset.curvature;
            document.getElementById('inputWidth').value = path.getAttribute('stroke-width');
            document.getElementById('widthVal').textContent = path.getAttribute('stroke-width') + 'px';
            
            openSheet('lineInspectorSheet');
        }

        function unselectAll() {
            document.querySelectorAll('.sandbox-item').forEach(i => i.style.outline = 'none');
            document.querySelectorAll('path').forEach(p => p.classList.remove('line-selected'));
            activeElement = null;
            activeLine = null;
        }

        // Обновление параметров вектора (Линий)
        function updateLineStyle(type, val) {
            if (!activeLine) return;
            if (type === 'curvature') {
                activeLine.dataset.curvature = val;
                document.getElementById('curveVal').textContent = val;
                renderPath(activeLine);
            } else if (type === 'width') {
                activeLine.setAttribute('stroke-width', val);
                document.getElementById('widthVal').textContent = val + 'px';
            } else if (type === 'color') {
                activeLine.setAttribute('stroke', val);
                activeLine.setAttribute('filter', `drop-shadow(0px 0px 10px ${val})`);
            }
        }

        // Драг для HTML элементов (Исправленный фикс сплита клик/драг)
        function bindTouchDrag(el, isElement) {
            let startX, startY, initX = 0, initY = 0;
            let moveX = 0, moveY = 0;
            let hasMoved = false;

            if (el.dataset.x) initX = parseFloat(el.dataset.x);
            if (el.dataset.y) initY = parseFloat(el.dataset.y);
            el.style.transform = `translate3d(${initX}px, ${initY}px, 0)`;

            el.addEventListener('touchstart', start, {passive:false});
            el.addEventListener('mousedown', start);

            function start(e) {
                const t = e.type === 'touchstart' ? e.touches[0] : e;
                startX = t.clientX - initX;
                startY = t.clientY - initY;
                hasMoved = false;

                window.addEventListener('touchmove', move, {passive:false});
                window.addEventListener('mousemove', move);
                window.addEventListener('touchend', end);
                window.addEventListener('mouseup', end);
            }

            function move(e) {
                e.preventDefault();
                const t = e.type === 'touchmove' ? e.touches[0] : e;
                moveX = t.clientX - startX;
                moveY = t.clientY - startY;

                if (Math.abs(moveX - initX) > CLICK_THRESHOLD || Math.abs(moveY - initY) > CLICK_THRESHOLD) {
                    hasMoved = true;
                }

                initX = moveX;
                initY = moveY;
                el.dataset.x = initX;
                el.dataset.y = initY;
                el.style.transform = `translate3d(${initX}px, ${initY}px, 0)`;
            }

            function end() {
                window.removeEventListener('touchmove', move);
                window.removeEv
