<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Sandbox</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22UI%20Sandbox%22,%22short_name%22:%22Sandbox%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#1e1e2e%22,%22theme_color%22:%22#89b4fa%22}">
    <style>
        /* Стили для режима хаоса / кастомизации */
        .editable-element:hover {
            outline: 2px dashed #89b4fa;
            cursor: pointer;
        }
        .resizable {
            resize: both;
            overflow: auto;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col md:flex-row font-sans overflow-hidden">

    <aside class="w-full md:w-80 bg-slate-800 border-b md:border-b-0 md:border-r border-slate-700 flex flex-col h-1/3 md:h-screen z-10 shrink-0">
        <div class="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-850">
            <h1 class="text-xl font-bold tracking-wider text-sky-400 flex items-center gap-2">
                <span class="material-symbols-outlined">science</span> UI Sandbox
            </h1>
            <span class="text-xs bg-slate-700 px-2 py-1 rounded text-slate-400">v1.0 (PWA)</span>
        </div>

        <div class="p-4 flex-1 overflow-y-auto space-y-4">
            <div>
                <h3 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Создать хаос (Элементы)</h3>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="addElement('button')" class="flex items-center gap-1 justify-center py-2 px-3 bg-blue-600 hover:bg-blue-500 rounded text-sm transition font-medium">Кнопка</button>
                    <button onclick="addElement('input')" class="flex items-center gap-1 justify-center py-2 px-3 bg-emerald-600 hover:bg-emerald-500 rounded text-sm transition font-medium">Поле ввода</button>
                    <button onclick="addElement('card')" class="flex items-center gap-1 justify-center py-2 px-3 bg-purple-600 hover:bg-purple-500 rounded text-sm transition font-medium">Карточка</button>
                    <button onclick="addElement('text')" class="flex items-center gap-1 justify-center py-2 px-3 bg-amber-600 hover:bg-amber-500 rounded text-sm transition font-medium">Текст</button>
                </div>
            </div>

            <div>
                <h3 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Шаблоны (Templates)</h3>
                <div class="space-y-2">
                    <select id="templateSelect" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-sky-500">
                        <option value="empty">Пустой холст</option>
                        <option value="login">Форма логина (Сломать)</option>
                        <option value="dashboard">Мини-Дашборд</option>
                        <option value="chat">Интерфейс чата</option>
                    </select>
                    <div class="flex gap-2">
                        <button onclick="loadTemplate()" class="flex-1 py-1.5 px-3 bg-slate-700 hover:bg-slate-600 border border-slate-600 rounded text-xs transition">Загрузить</button>
                        <button onclick="saveAsCustomTemplate()" class="flex-1 py-1.5 px-3 bg-sky-600 hover:bg-sky-500 rounded text-xs transition font-medium">Сохранить текущий</button>
                    </div>
                </div>
            </div>

            <div>
                <h3 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Режим взаимодействия</h3>
                <div class="flex flex-col gap-2">
                    <label class="flex items-center gap-2 text-sm cursor-pointer bg-slate-750 p-2 rounded hover:bg-slate-700">
                        <input type="checkbox" id="dragCheck" onchange="toggleDragging()" class="rounded bg-slate-700 border-slate-600 text-sky-500 focus:ring-0">
                        <span>Разрешить перетаскивание (Drag)</span>
                    </label>
                    <label class="flex items-center gap-2 text-sm cursor-pointer bg-slate-750 p-2 rounded hover:bg-slate-700">
                        <input type="checkbox" id="resizeCheck" onchange="toggleResizing()" class="rounded bg-slate-700 border-slate-600 text-sky-500 focus:ring-0">
                        <span>Разрешить изменение размера</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="p-4 border-t border-slate-700 bg-slate-850 flex gap-2">
            <button onclick="clearCanvas()" class="flex-1 py-2 px-3 bg-rose-700 hover:bg-rose-600 rounded text-sm font-medium transition flex items-center justify-center gap-1">
                <span class="material-symbols-outlined text-sm">delete</span> Очистить
            </button>
        </div>
    </aside>

    <div id="inspector" class="hidden fixed bg-slate-800 border border-slate-700 shadow-2xl rounded-lg p-4 w-72 z-50 text-xs space-y-3">
        <div class="flex justify-between items-center border-b border-slate-700 pb-2">
            <span class="font-bold text-sky-400 uppercase tracking-wider">Свойства элемента</span>
            <button onclick="closeInspector()" class="text-slate-400 hover:text-slate-200 text-lg">&times;</button>
        </div>
        <div>
            <label class="block mb-1 text-slate-400">Текст/Содержимое:</label>
            <input type="text" id="insText" oninput="updateCurrentElement('innerText', this.value)" class="w-full bg-slate-700 border border-slate-600 rounded px-2 py-1 text-slate-200">
        </div>
        <div>
            <label class="block mb-1 text-slate-400">Цвет фона (Tailwind класс):</label>
            <input type="text" id="insBg" oninput="updateCurrentElementClass('bg-', this.value)" class="w-full bg-slate-700 border border-slate-600 rounded px-2 py-1 text-slate-200" placeholder="напр., bg-red-500">
        </div>
        <div class="flex gap-2 pt-2">
            <button onclick="deleteCurrentElement()" class="w-full py-2 bg-rose-600 hover:bg-rose-500 text-white rounded font-medium transition">Удалить элемент</button>
        </div>
    </div>

    <main id="canvas" class="flex-1 h-2/3 md:h-screen overflow-auto relative p-6 bg-slate-950 pattern-grid-md">
        <div id="canvasContent" class="w-full h-full relative">
            <div class="text-slate-500 absolute inset-0 flex items-center justify-center pointer-events-none select-none text-center p-4">
                <div>
                    <p class="text-lg font-medium">Песочница UI готова к деструкции</p>
                    <p class="text-sm mt-1">Добавляйте элементы, двигайте их, меняйте код или загружайте темплейты.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('canvasContent');
        const inspector = document.getElementById('inspector');
        let selectedElement = null;

        // Встроенная база готовых темплейтов
        const templates = {
            login: `<div class="editable-element max-w-sm mx-auto my-12 bg-slate-800 p-6 rounded-xl shadow-md border border-slate-700 absolute top-10 left-10" style="width:320px">
                <h2 class="text-xl font-bold text-center mb-4">Вход в Систему</h2>
                <input type="text" placeholder="Логин" class="w-full bg-slate-700 border border-slate-600 rounded p-2 mb-3 text-sm">
                <input type="password" placeholder="Пароль" class="w-full bg-slate-700 border border-slate-600 rounded p-2 mb-4 text-sm">
                <button class="w-full bg-sky-500 text-slate-900 font-bold p-2 rounded text-sm hover:bg-sky-400">Войти</button>
            </div>`,
            dashboard: `<div class="editable-element grid grid-cols-2 gap-4 p-4 bg-slate-800 border border-slate-700 rounded-xl absolute top-5 left-5" style="width:450px">
                <div class="bg-slate-700 p-3 rounded text-center"><p class="text-xs text-slate-400">Трафик</p><p class="text-xl font-bold text-emerald-400">+142%</p></div>
                <div class="bg-slate-700 p-3 rounded text-center"><p class="text-xs text-slate-400">Ошибки</p><p class="text-xl font-bold text-rose-400">0</p></div>
                <div class="col-span-2 bg-slate-900 p-2 rounded text-xs text-slate-400">Сервер работает стабильно.</div>
            </div>`,
            chat: `<div class="editable-element flex flex-col h-64 w-80 bg-slate-800 border border-slate-700 rounded-xl overflow-hidden absolute top-20 left-20">
                <div class="bg-slate-700 p-2 text-xs font-bold">Глобальный флуд</div>
                <div class="flex-1 p-2 space-y-2 overflow-y-auto text-xs">
                    <div class="bg-slate-900 p-1.5 rounded w-3/4">Привет! Что тут происходит?</div>
                    <div class="bg-sky-900 p-1.5 rounded w-3/4 ml-auto text-right">Мы ломаем интерфейсы.</div>
                </div>
                <div class="p-2 border-t border-slate-700 flex gap-1"><input type="text" placeholder="Текст..." class="flex-1 bg-slate-900 rounded px-2 text-xs"><button class="bg-sky-500 text-slate-950 px-2 rounded text-xs font-bold">></button></div>
            </div>`
        };

        // Инициализация кастомных пользовательских шаблонов из localStorage
        function initCustomTemplates() {
            const select = document.getElementById('templateSelect');
            // Очищаем старые кастомные опции
            Array.from(select.options).forEach(opt => { if(opt.dataset.custom) opt.remove(); });
            
            const saved = JSON.parse(localStorage.getItem('ui_sandbox_templates') || '{}');
            for (let name in saved) {
                const opt = document.createElement('option');
                opt.value = 'custom_' + name;
                opt.textContent = `⭐ ${name}`;
                opt.dataset.custom = true;
                select.appendChild(opt);
            }
        }

        // Загрузка выбранного темплейта
        function loadTemplate() {
            const val = document.getElementById('templateSelect').value;
            if (val === 'empty') { clearCanvas(); return; }
            
            let html = '';
            if (val.startsWith('custom_')) {
                const name = val.replace('custom_', '');
                const saved = JSON.parse(localStorage.getItem('ui_sandbox_templates') || '{}');
                html = saved[name] || '';
            } else {
                html = templates[val] || '';
            }
            
            canvas.innerHTML = html;
            attachListeners();
        }

        // Сохранить текущее состояние холста как личный темплейт
        function saveAsCustomTemplate() {
            const name = prompt('Введите название вашего шаблона:');
            if (!name) return;
            const saved = JSON.parse(localStorage.getItem('ui_sandbox_templates') || '{}');
            saved[name] = canvas.innerHTML;
            localStorage.setItem('ui_sandbox_templates', JSON.stringify(saved));
            initCustomTemplates();
            document.getElementById('templateSelect').value = 'custom_' + name;
        }

        // Добавление базового элемента в песочницу
        function addElement(type) {
            const el = document.createElement('div');
            el.className = 'editable-element absolute p-3 bg-slate-800 border border-slate-700 rounded-lg text-sm shadow-md transition-all';
            // Случайное спавн-место, чтобы элементы не ложились друг на друга
            el.style.top = `${Math.random() * 40 + 10}%`;
            el.style.left = `${Math.random() * 40 + 10}%`;

            if (type === 'button') {
                el.innerHTML = `<button class="px-4 py-2 bg-blue-600 rounded font-bold hover:bg-blue-500 transition">Жмякни меня</button>`;
            } else if (type === 'input') {
                el.innerHTML = `<input type="text" placeholder="Пиши сюда..." class="bg-slate-900 border border-slate-600 rounded p-2 text-xs text-white placeholder-slate-500 focus:outline-none">`;
            } else if (type === 'card') {
                el.innerHTML = `<div class="w-48"><h4 class="font-bold text-sky-400 mb-1">Заголовок карты</h4><p class="text-xs text-slate-300">Внутри этой карточки можно творить что угодно.</p></div>`;
            } else if (type === 'text') {
                el.innerHTML = `<p class="text-base font-semibold text-slate-100">Просто редактируемый текст</p>`;
            }

            canvas.appendChild(el);
            attachListeners();
        }

        // Навешивание обработчиков на элементы на холсте
        function attachListeners() {
            const elements = canvas.querySelectorAll('.editable-element');
            elements.forEach(el => {
                // Клик вызывает инспектор свойств
                el.onclick = (e) => {
                    e.stopPropagation();
                    openInspector(el, e);
                };
                
                // Инициализация Drag and Drop (если включен)
                setupDrag(el);
            });
            // Обновляем состояния флагов resize/drag для новых элементов
            toggleResizing();
        }

        // Drag & Drop логика (работает на десктопах и смартфонах)
        function setupDrag(el) {
            let posX = 0, posY = 0, mouseX = 0, mouseY = 0;
            
            el.onmousedown = dragMouseDown;
            el.ontouchstart = dragMouseDown;

            function dragMouseDown(e) {
                if (!document.getElementById('dragCheck').checked) return;
                // Не перетаскивать, если кликнули по внутреннему input или button
                if(e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
                
                e = e || window.event;
                const isTouch = e.type === 'touchstart';
                mouseX = isTouch ? e.touches[0].clientX : e.clientX;
                mouseY = isTouch ? e.touches[0].clientY : e.clientY;
                
                document.onmouseup = closeDragElement;
                document.ontouchend = closeDragElement;
                document.onmousemove = elementDrag;
                document.ontouchmove = elementDrag;
            }

            function elementDrag(e) {
                e = e || window.event;
                const isTouch = e.type === 'touchmove';
                let clientX = isTouch ? e.touches[0].clientX : e.clientX;
                let clientY = isTouch ? e.touches[0].clientY : e.clientY;
                
                posX = mouseX - clientX;
                posY = mouseY - clientY;
                mouseX = clientX;
                mouseY = clientY;
                
                el.style.top = (el.offsetTop - posY) + "px";
                el.style.left = (el.offsetLeft - posX) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
                document.ontouchend = null;
                document.ontouchmove = null;
            }
        }

        // Переключение возможности изменять размеры (через нативный CSS resize)
        function toggleResizing() {
            const active = document.getElementById('resizeCheck').checked;
            canvas.querySelectorAll('.editable-element').forEach(el => {
                if(active) el.classList.add('resizable');
                else el.classList.remove('resizable');
            });
        }

        function toggleDragging() {
            // Флаг проверяется динамически внутри самого обработчика dragMouseDown
        }

        // Работа с инспектором
        function openInspector(el, event) {
            selectedElement = el;
            inspector.style.display = 'block';
            
            // Позиционируем инспектор у мышки/тача с защитой от вылета за экран
            let left = event.clientX || (event.touches ? event.touches[0].clientX : 100);
            let top = event.clientY || (event.touches ? event.touches[0].clientY : 100);
            if (left + 300 > window.innerWidth) left -= 300;
            if (top + 250 > window.innerHeight) top -= 250;
            
            inspector.style.left = left + 'px';
            inspector.style.top = top + 'px';

            // Заполняем поля текущими значениями элемента
            document.getElementById('insText').value = el.innerText || '';
            
            // Ищем класс бэкграунда (упрощенно для демонстрации)
            const bgClass = Array.from(el.classList).find(c => c.startsWith('bg-'));
            document.getElementById('insBg').value = bgClass || 'bg-slate-800';
        }

        function closeInspector() {
            inspector.style.display = 'none';
            selectedElement = null;
        }

        function updateCurrentElement(property, value) {
            if (!selectedElement) return;
            // Обновляем текст либо глубокого дочернего элемента, либо самого дива
            const innerTarget = selectedElement.querySelector('button, p, h2, h4') || selectedElement;
            innerTarget.innerText = value;
        }

        function updateCurrentElementClass(prefix, newValue) {
            if (!selectedElement) return;
            // Удаляем старый класс цвета и ставим новый
            const classes = Array.from(selectedElement.classList);
            classes.forEach(c => { if(c.startsWith(prefix)) selectedElement.classList.remove(c); });
            if (newValue) selectedElement.classList.add(newValue);
        }

        function deleteCurrentElement() {
            if (!selectedElement) return;
            selectedElement.remove();
            closeInspector();
        }

        function clearCanvas() {
            canvas.innerHTML = `<div class="text-slate-500 absolute inset-0 flex items-center justify-center pointer-events-none select-none text-center p-4"><div><p class="text-lg font-medium">Песочница UI пуста</p></div></div>`;
            closeInspector();
        }

        // Закрывать инспектор по клику на пустое место холста
        document.getElementById('canvas').onclick = function(e) {
            if(e.target === this || e.target === canvas) closeInspector();
        };

        // Сервис-воркер "на лету" (Заглушка для полноценного PWA offline-режима)
        if ('serviceWorker' in navigator) {
            const swCode = `self.addEventListener('fetch', function(e) {});`; // Простейший SW для установки приложения
            const blob = new Blob([swCode], {type: 'application/javascript'});
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl, {scope: './'}).catch(err => console.log(err));
        }

        // Старт приложения
        initCustomTemplates();
    </script>
</body>
  </html>
